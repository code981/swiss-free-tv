name: Continuous Improvement

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: continuous-improvement-report
          path: reports/continuous-improvement.md
